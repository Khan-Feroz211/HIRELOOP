worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Rate limiting zone (per IP)
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name hireloop.pk www.hireloop.pk;

        # Redirect HTTP → HTTPS
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name hireloop.pk www.hireloop.pk;

        ssl_certificate /etc/letsencrypt/live/hireloop.pk/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hireloop.pk/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Frontend — Next.js
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API — FastAPI
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Apply rate limiting to API routes
            limit_req zone=api burst=40 nodelay;
        }

        # Direct API access (no /api prefix)
        location ~ ^/(auth|applications|ai|jobs|webhooks|docs|redoc|openapi.json) {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            limit_req zone=api burst=40 nodelay;
        }
    }
}
