version: "3.9"

# HireLoop PK — Production Docker Compose
# Runs on Hetzner CX11 VPS (€3.79/mo)
# Usage: docker compose -f docker-compose.prod.yml up -d

services:

  # ── PostgreSQL (self-hosted in prod) ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: hireloop_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hireloop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hireloop_net

  # ── Redis (self-hosted in prod) ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hireloop_redis_prod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - hireloop_net

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    image: ghcr.io/khan-feroz211/hireloop-backend:latest
    container_name: hireloop_backend_prod
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/hireloop
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/hireloop
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
      "
    networks:
      - hireloop_net

  # ── n8n Automation ─────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: hireloop_n8n
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      WEBHOOK_URL: https://hireloop.pk
      HIRELOOP_API_URL: http://backend:8000
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - hireloop_net

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: hireloop_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - hireloop_net

  # ── Certbot (Let's Encrypt SSL) ────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    command: >
      certonly --webroot
      --webroot-path=/var/www/certbot
      --email ${ADMIN_EMAIL}
      --agree-tos
      --no-eff-email
      -d hireloop.pk -d www.hireloop.pk

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  certbot_data:
  certbot_www:

networks:
  hireloop_net:
    driver: bridge
